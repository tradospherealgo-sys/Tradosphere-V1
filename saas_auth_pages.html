<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tradosphere - Authentication</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0F1419;
            --card: #1A2332;
            --border: #374151;
            --accent: #6366F1;
            --success: #10B981;
            --danger: #EF4444;
            --text: #E5E7EB;
            --muted: #9CA3AF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, var(--bg) 0%, #1a1f3a 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 450px;
        }

        .auth-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-text {
            font-size: 32px;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 14px;
            color: var(--muted);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--muted);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .form-input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        .form-button {
            width: 100%;
            background: var(--accent);
            border: none;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .form-button:hover {
            background: rgba(99, 102, 241, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
        }

        .form-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .form-toggle {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--muted);
        }

        .form-toggle a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .form-toggle a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .error-message.show {
            display: block;
            animation: shake 0.3s ease-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .success-message {
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        .divider {
            margin: 30px 0;
            border: none;
            border-top: 1px solid var(--border);
        }

        .extra-name {
            display: none;
            gap: 12px;
        }

        .extra-name.show {
            display: flex;
        }

        .extra-name input {
            flex: 1;
        }

        #signupForm { display: none; }
        #loginForm { display: block; }

        .loading {
            display: inline-block;
            width: 4px;
            height: 4px;
            margin: 0 2px;
            background: currentColor;
            border-radius: 50%;
            animation: dots 1.3s ease-in-out infinite;
        }

        @keyframes dots {
            0%, 60%, 100% { opacity: 0.3; }
            30% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-box">
            <div class="logo">
                <div class="logo-text">🌍 TRADOSPHERE</div>
                <div class="subtitle">Trading Intelligence Platform</div>
            </div>

            <!-- LOGIN FORM -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="error-message" id="loginError"></div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="loginPassword" placeholder="••••••••" required>
                </div>

                <button type="submit" class="form-button" id="loginBtn">
                    🔐 Login to Dashboard
                </button>

                <div class="divider"></div>

                <div class="form-toggle">
                    Don't have an account? <a onclick="toggleForm()">Sign Up</a>
                    <br><br>
                    <a href="/demo" style="color: var(--success); font-size: 12px;">Try Demo (No login)</a>
                </div>
            </form>

            <!-- SIGNUP FORM -->
            <form id="signupForm" onsubmit="handleSignup(event)">
                <div class="error-message" id="signupError"></div>

                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-input" id="signupEmail" placeholder="you@example.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-input" id="signupPassword" placeholder="Minimum 6 characters" required minlength="6">
                </div>

                <div class="form-group extra-name" id="nameFields">
                    <input type="text" class="form-input" id="firstName" placeholder="First Name">
                    <input type="text" class="form-input" id="lastName" placeholder="Last Name">
                </div>

                <button type="submit" class="form-button" id="signupBtn">
                    ✨ Create Account
                </button>

                <div class="divider"></div>

                <div class="form-toggle">
                    Already have an account? <a onclick="toggleForm()">Login</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const API = window.location.origin;

        function toggleForm() {
            document.getElementById('loginForm').style.display =
                document.getElementById('loginForm').style.display === 'none' ? 'block' : 'none';
            document.getElementById('signupForm').style.display =
                document.getElementById('signupForm').style.display === 'none' ? 'block' : 'none';
        }

        async function handleLogin(event) {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('loginError');

            btn.disabled = true;
            btn.textContent = 'Logging in...';
            errorDiv.classList.remove('show');

            try {
                const response = await fetch(`${API}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Login failed');
                }

                // Save tokens
                localStorage.setItem('access_token', data.data.tokens.access_token);
                localStorage.setItem('refresh_token', data.data.tokens.refresh_token);
                localStorage.setItem('user', JSON.stringify(data.data.user));

                // Redirect to dashboard
                window.location.href = '/dashboard';

            } catch (error) {
                errorDiv.textContent = '❌ ' + error.message;
                errorDiv.classList.add('show');
                btn.disabled = false;
                btn.textContent = '🔐 Login to Dashboard';
            }
        }

        async function handleSignup(event) {
            event.preventDefault();
            const email = document.getElementById('signupEmail').value.trim();
            const password = document.getElementById('signupPassword').value;
            const firstName = document.getElementById('firstName').value.trim();
            const lastName = document.getElementById('lastName').value.trim();
            const btn = document.getElementById('signupBtn');
            const errorDiv = document.getElementById('signupError');

            btn.disabled = true;
            btn.textContent = 'Creating account...';
            errorDiv.classList.remove('show');

            try {
                const response = await fetch(`${API}/api/auth/signup`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email,
                        password,
                        first_name: firstName,
                        last_name: lastName
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.message || 'Signup failed');
                }

                // Save tokens
                localStorage.setItem('access_token', data.data.tokens.access_token);
                localStorage.setItem('refresh_token', data.data.tokens.refresh_token);
                localStorage.setItem('user', JSON.stringify(data.data.user));

                // Redirect to dashboard
                window.location.href = '/dashboard';

            } catch (error) {
                errorDiv.textContent = '❌ ' + error.message;
                errorDiv.classList.add('show');
                btn.disabled = false;
                btn.textContent = '✨ Create Account';
            }
        }

        // Check if already logged in
        window.addEventListener('load', () => {
            if (localStorage.getItem('access_token')) {
                window.location.href = '/dashboard';
            }
        });
    </script>
</body>
</html>
